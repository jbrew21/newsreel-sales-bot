services:
  - type: worker
    name: newsreel-sales-bot
    runtime: node
    buildCommand: npm install
    startCommand: node bot-v2.js
    plan: starter
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "6535760391"
      - key: LIBRARY_AGENT_ID
        sync: false
      - key: SCHOOL_AGENT_ID
        sync: false
      - key: FOLLOWUP_AGENT_ID
        sync: false
      - key: ENV_ID
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: DUCKY_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/New_York
    disk:
      name: bot-memory
      mountPath: /app/memory
      sizeGB: 1
